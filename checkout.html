<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Veloura</title>

  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">VELOURA.</div>
  </nav>

  <!-- CHECKOUT -->
  <section class="checkout-page">
    <h1 class="section-title">Checkout</h1>

    <div class="checkout-container">

      <!-- LEFT: ADDRESS -->
      <div class="checkout-left">
        <h2>Shipping Details</h2>

        <form id="checkout-form">
          <input type="text" placeholder="Full Name" required pattern="[A-Za-z ]+">
          <input type="text" placeholder="Address" required>
          <input type="text" placeholder="City" required>
          <input type="text" placeholder="State" required>
          <input type="text" placeholder="Pincode" required pattern="[0-9]{6}" maxlength="6">
          <input type="tel" placeholder="Phone Number" required pattern="[0-9]{10}" maxlength="10">

          <button type="submit" class="btn-full">Place Order</button>
        </form>
      </div>

      <!-- RIGHT: ORDER SUMMARY -->
      <div class="checkout-right">
        <h2>Order Summary</h2>

        <div id="checkout-items"></div>

        <hr>

        <div class="summary-row total">
          <span>Total</span>
          <span id="checkout-total">₹0</span>
        </div>
      </div>

    </div>
  </section>

  <!-- SCRIPTS -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="scripts/config.js" defer></script>
  <script src="scripts/checkout.js"></script>

</body>
</html>
