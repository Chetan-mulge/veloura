<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Veloura — Curated vintage and artisan fashion from India.">
  <title>Veloura | Timeless Indian Fashion</title>

  <link rel="stylesheet" href="styles/main.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=DM+Sans&display=swap">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<header>
  <nav class="navbar">
    <div class="logo">VELOURA.</div>

    <div class="search-bar">
      <input type="text" placeholder="Search kurtas, jewellery…">
      <button><i class="fas fa-search"></i></button>
    </div>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="#shop">Products</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

    <div class="nav-icons">
      <a href="login.html" id="user-link">
        <i class="fas fa-user"></i>
      </a>

      <!--  FIXED CART -->
      <a href="cart.html" id="cart-link">
        <div class="cart-container">
          <i class="fas fa-shopping-bag"></i>
          <span id="cart-count" class="cart-badge">0</span>
        </div>
      </a>

      <div class="hamburger"><i class="fas fa-bars"></i></div>
    </div>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1><em>Timeless</em><br>Elegance</h1>
    <p>Curated artisan styles for modern India</p>
    <a href="#shop" class="btn-primary">Explore Collection</a>
  </div>
</section>

<section id="shop" class="shop-section">
  <h2 class="section-title">Curated Collection</h2>
  <div class="product-grid" id="product-grid">
    <div class="loading">Loading products...</div>
  </div>
</section>

<footer>
  <p>© 2024 Veloura. All rights reserved.</p>
</footer>

<script src="scripts/app.js"></script>

<!-- LOGIN CHECK SCRIPT -->
<script>
  window.addEventListener("DOMContentLoaded", () => {
    const user = JSON.parse(localStorage.getItem("veloura_user"));

    const cartLink = document.getElementById("cart-link");
    const userLink = document.getElementById("user-link");

    console.log("User:", user);

    if (user) {
      // ✅ LOGGED IN
      if (cartLink) cartLink.style.display = "inline-block";

      if (userLink) {
        userLink.innerHTML = "Logout";
        userLink.style.cursor = "pointer";

        userLink.onclick = function(e) {
          e.preventDefault();
          localStorage.removeItem("veloura_user");
          window.location.reload();
        };
      }

    } else {
      // ❌ NOT LOGGED IN
      if (cartLink) cartLink.style.display = "none";
    }
  });
</script>

</body>
</html>
