<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders | Veloura</title>

  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

<h1 style="text-align:center;margin-top:40px;">Your Orders</h1>

<div id="orders" style="text-align:center;margin-top:30px;"></div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const container = document.getElementById("orders");

    // 🔐 Check login
    const session = JSON.parse(localStorage.getItem("veloura_session"));

    if (!session) {
      window.location.href = "login.html";
      return;
    }

    // 🚫 No backend yet → show placeholder
    container.innerHTML = `
      <p style="color:gray;font-size:16px;">
        Orders feature will be available after backend integration 🚀
      </p>
    `;
  });
</script>

</body>
</html>
